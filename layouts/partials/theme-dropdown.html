<div class="theme-dropdown">
  <button
    class="theme-toggle"
    aria-label="{{ i18n "Settings" }}"
    aria-expanded="false"
    aria-haspopup="true"
    data-js="theme-toggle"
  >
    <span class="theme-icon" data-js="theme-icon">
      <svg width="24" height="24" aria-hidden="true">
        <use href="{{ "/img/svg/sprite.svg?v=20260212a" | relURL }}#icon-theme-palette"></use>
      </svg>
    </span>
  </button>

  <div class="theme-overlay" hidden data-js="theme-overlay"></div>

  <div class="theme-panel" hidden data-js="theme-panel">
    <div class="theme-section">
      <div class="theme-section-heading">
        <h3 class="theme-section-title">{{ i18n "mode" }}</h3>
        <span class="toggle-switch__shortcut" data-shortcut="M">M</span>
      </div>
      <div class="theme-options theme-options--segmented" role="tablist" aria-label="{{ i18n "mode" }}">
        <button
          class="theme-option"
          data-mode="light"
          data-js="mode-option"
          role="tab"
          aria-label="{{ i18n "light_mode" }}"
        >
          <svg class="theme-option-icon" width="20" height="20" aria-hidden="true">
            <use href="{{ "/img/svg/sprite.svg?v=20260222a" | relURL }}#icon-light"></use>
          </svg>
          <span>{{ i18n "light_mode" }}</span>
        </button>

        <button
          class="theme-option"
          data-mode="dark"
          data-js="mode-option"
          role="tab"
          aria-label="{{ i18n "dark_mode" }}"
        >
          <svg class="theme-option-icon" width="20" height="20" aria-hidden="true">
            <use href="{{ "/img/svg/sprite.svg?v=20260222a" | relURL }}#icon-dark"></use>
          </svg>
          <span>{{ i18n "dark_mode" }}</span>
        </button>

        <button
          class="theme-option"
          data-mode="system"
          data-js="mode-option"
          role="tab"
          aria-label="{{ i18n "system_mode" }}"
        >
          <svg class="theme-option-icon" width="20" height="20" aria-hidden="true">
            <use href="{{ "/img/svg/sprite.svg?v=20260222a" | relURL }}#icon-system-screen"></use>
          </svg>
          <span>{{ i18n "system_mode" }}</span>
        </button>
      </div>
    </div>

    <div class="theme-divider"></div>

    <div class="theme-section">
      <div class="theme-section-heading">
        <h3 class="theme-section-title">{{ i18n "typography" }}</h3>
        <span class="toggle-switch__shortcut" data-shortcut="T">T</span>
      </div>
      <div class="theme-options theme-options--typography">
        <button
          class="theme-option theme-option--typography"
          data-typography="editorial"
          data-js="typography-option"
          aria-label="Editorial"
        >
          <span class="typography-preview">Aa</span>
          <span class="typography-label">Editorial</span>
        </button>

        <button
          class="theme-option theme-option--typography"
          data-typography="refined"
          data-js="typography-option"
          aria-label="Refined"
        >
          <span class="typography-preview typography-preview--refined">Aa</span>
          <span class="typography-label">Refined</span>
        </button>

        <button
          class="theme-option theme-option--typography"
          data-typography="expressive"
          data-js="typography-option"
          aria-label="Expressive"
        >
          <span class="typography-preview typography-preview--expressive">Aa</span>
          <span class="typography-label">Expressive</span>
        </button>

        <button
          class="theme-option theme-option--typography"
          data-typography="technical"
          data-js="typography-option"
          aria-label="Technical"
        >
          <span class="typography-preview typography-preview--technical">Aa</span>
          <span class="typography-label">Technical</span>
        </button>

        <button
          class="theme-option theme-option--typography"
          data-typography="system"
          data-js="typography-option"
          aria-label="System"
        >
          <span class="typography-preview typography-preview--system">Aa</span>
          <span class="typography-label">System</span>
        </button>
      </div>
    </div>

    <div class="theme-divider"></div>

    <div class="theme-section">
      <div class="theme-section-heading">
        <h3 class="theme-section-title">Effects</h3>
        <span class="toggle-switch__shortcut" data-shortcut="E">E</span>
      </div>
      <div class="theme-effects">
        <button
          class="theme-effect-button"
          data-js="coty-mode-toggle"
          aria-label="{{ i18n "coty_activate" }}"
          data-label-activate="{{ i18n "coty_activate" }}"
          data-label-deactivate="{{ i18n "coty_deactivate" }}"
        >
          <svg class="theme-option-icon" width="20" height="20" aria-hidden="true">
            <use href="{{ "/img/svg/sprite.svg?v=20260223b" | relURL }}#icon-pantone-effect"></use>
          </svg>
        </button>
        <button
          class="theme-effect-button"
          data-js="grid-toggle"
          data-toast-title="{{ i18n "toast_grid_title" }}"
          data-toast-on="{{ i18n "toast_grid_on" }}"
          data-toast-off="{{ i18n "toast_grid_off" }}"
          aria-pressed="false"
          aria-label="Toggle grid overlay"
        >
          <svg class="theme-option-icon" width="20" height="20" aria-hidden="true">
            <use href="{{ "/img/svg/sprite.svg?v=20260223b" | relURL }}#icon-grid-effect"></use>
          </svg>
        </button>
        <button class="theme-effect-button" data-js="effect-blend-toggle" data-toast-title="{{ i18n "toast_blend_title" }}" data-toast-on="{{ i18n "toast_effect_on" }}" data-toast-off="{{ i18n "toast_effect_off" }}" data-toast-icon="icon-blend-effect" aria-pressed="false" aria-label="Toggle image blend">
          <svg class="theme-option-icon" width="20" height="20" aria-hidden="true">
            <use href="{{ "/img/svg/sprite.svg?v=20260224a" | relURL }}#icon-blend-effect"></use>
          </svg>
        </button>
        <button class="theme-effect-button" data-js="effect-grain-toggle" data-toast-title="{{ i18n "toast_grain_title" }}" data-toast-on="{{ i18n "toast_effect_on" }}" data-toast-off="{{ i18n "toast_effect_off" }}" data-toast-icon="icon-grain-effect" aria-pressed="false" aria-label="Toggle noise">
          <svg class="theme-option-icon" width="20" height="20" aria-hidden="true">
            <use href="{{ "/img/svg/sprite.svg?v=20260223b" | relURL }}#icon-grain-effect"></use>
          </svg>
        </button>
        <button class="theme-effect-button" data-js="effect-motion-toggle" data-toast-title="{{ i18n "toast_motion_title" }}" data-toast-on="{{ i18n "toast_effect_on" }}" data-toast-off="{{ i18n "toast_effect_off" }}" data-toast-icon="icon-motion-effect" aria-pressed="false" aria-label="Toggle reduce motion">
          <svg class="theme-option-icon" width="20" height="20" aria-hidden="true">
            <use href="{{ "/img/svg/sprite.svg?v=20260223b" | relURL }}#icon-motion-effect"></use>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
